name = "mykai-discovery"
main = "worker.ts"
compatibility_date = "2025-01-15"

# KV namespace holding member heartbeats. One key per nodeId:
#   m:<nodeId>  →  Member JSON (auto-expires after 20 min)
# Plus one churn-detection snapshot key:
#   churn:active_count  →  { ts, count }
#
# To create the namespace:
#   wrangler kv namespace create SWARM
# Then paste the returned id below.
[[kv_namespaces]]
binding = "SWARM"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
